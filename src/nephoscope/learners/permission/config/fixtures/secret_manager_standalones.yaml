# Secret-manager standalone deny rules.
#
# These rules block the top-level (standalone) form of secret-manager CLI
# commands. When run standalone, these commands print the secret value to
# stdout, which enters the conversation transcript as tool output — a
# credential leak even though no file was read.
#
# The safe form is command substitution: $(op read 'op://...') passes the
# value directly to the consuming command without printing it. These rules
# carry context='toplevel' so only the standalone form is blocked; legitimate
# inline substitution use is unaffected.

# 1Password CLI
- verb: op
  subcommand: read
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    1Password CLI standalone read leaks the secret value to the conversation
    transcript. Use inline command substitution instead —
    $(op read 'op://Vault/Item/field') — so the secret reaches the consumer
    directly without being printed.

# HashiCorp Vault
- verb: vault
  subcommand: kv get
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    HashiCorp Vault kv get standalone leaks the secret value to the transcript.
    Use $(vault kv get -field=value secret/path) inline instead.

- verb: vault
  subcommand: secrets get
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    HashiCorp Vault secrets get standalone leaks the secret value to the transcript.
    Use $(vault secrets get -field=value secret/path) inline instead.

# Bitwarden CLI
- verb: bw
  subcommand: get
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    Bitwarden CLI standalone get leaks the secret value to the transcript.
    Use $(bw get password item-name) inline instead.

# Doppler
- verb: doppler
  subcommand: secrets get
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    Doppler standalone secrets get leaks the secret value to the transcript.
    Use $(doppler secrets get KEY --plain) inline instead.

# passwordstore (pass)
- verb: pass
  subcommand: show
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    passwordstore standalone show leaks the secret value to the transcript.
    Use $(pass show path/to/entry) inline instead.

# gopass
- verb: gopass
  subcommand: show
  flags: '*'
  context: toplevel
  decision: rejected
  reason: >-
    gopass standalone show leaks the secret value to the transcript.
    Use $(gopass show path/to/entry) inline instead.
