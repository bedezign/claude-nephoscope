_meta:
  id: python-dev
  order: 2
  description: "Python tooling (uv, ruff, pytest, …)"
permissions:
  # Python development tooling — opt-in permission fixture.
  #
  # Covers uv subcommands, common linting/testing/analysis tools,
  # and safe pip read-only subcommands. Apply on Python projects.

  # uv subcommands — project and environment management
  - verb: uv
    subcommand: run
    flags: "*"
    decision: approved
    reason: "uv run — any flags belong to the wrapped tool, not uv itself"

  - verb: uv
    subcommand: sync
    flags: []
    decision: approved

  - verb: uv
    subcommand: lock
    flags: []
    decision: approved

  - verb: uv
    subcommand: pip
    flags: []
    decision: approved

  - verb: uv
    subcommand: tool
    flags: []
    decision: approved

  - verb: uv
    subcommand: add
    flags: []
    decision: approved

  - verb: uv
    subcommand: remove
    flags: []
    decision: approved

  # Top-level Python tooling (no subcommand)
  - verb: ruff
    flags: []
    decision: approved

  - verb: pyright
    flags: []
    decision: approved

  - verb: pytest
    flags: []
    decision: approved

  - verb: mypy
    flags: []
    decision: approved

  - verb: black
    flags: []
    decision: approved

  - verb: isort
    flags: []
    decision: approved

  - verb: coverage
    flags: []
    decision: approved

  - verb: bandit
    flags: []
    decision: approved

  # mutmut — mutation testing
  - verb: mutmut
    subcommand: run
    flags: []
    decision: approved

  - verb: mutmut
    subcommand: results
    flags: []
    decision: approved

  # pip read-only subcommands (no bare pip install)
  - verb: pip
    subcommand: show
    flags: []
    decision: approved

  - verb: pip
    subcommand: list
    flags: []
    decision: approved

  - verb: pip
    subcommand: freeze
    flags: []
    decision: approved

verb_types:
  # task_runner: promotes first positional to subcommand
  # Safe for verbs whose rule_shapes already use explicit subcommands.
  # ruff, coverage, pyright, pytest, mypy, etc. are stored as subcommand: null
  # in rule_shapes — do NOT add them here.
  - verb: uv
    category: task_runner
  - verb: mutmut
    category: task_runner
  - verb: pip
    category: task_runner
