_meta:
  id: javascript
  order: 5
  description: "JavaScript/TypeScript tooling (node, npm, vitest, …)"
permissions:
  # JavaScript/TypeScript tooling — opt-in permission fixture.
  #
  # Covers Node runtimes within trusted project directories,
  # package manager read/run subcommands, and top-level build tools.

  # Runtimes — scoped to trusted project directories
  - verb: node
    flags: "*"
    path_spec: "$TRUSTED_DIR/**"
    decision: approved

  - verb: npx
    flags: "*"
    path_spec: "$TRUSTED_DIR/**"
    decision: approved

  - verb: deno
    flags: "*"
    path_spec: "$TRUSTED_DIR/**"
    decision: approved

  # npm subcommands
  - verb: npm
    subcommand: list
    flags: []
    decision: approved

  - verb: npm
    subcommand: info
    flags: []
    decision: approved

  - verb: npm
    subcommand: run
    flags: []
    decision: approved

  - verb: npm
    subcommand: test
    flags: []
    decision: approved

  - verb: npm
    subcommand: audit
    flags: []
    decision: approved

  # yarn subcommands
  - verb: yarn
    subcommand: list
    flags: []
    decision: approved

  - verb: yarn
    subcommand: info
    flags: []
    decision: approved

  - verb: yarn
    subcommand: run
    flags: []
    decision: approved

  - verb: yarn
    subcommand: test
    flags: []
    decision: approved

  - verb: yarn
    subcommand: audit
    flags: []
    decision: approved

  # pnpm subcommands
  - verb: pnpm
    subcommand: list
    flags: []
    decision: approved

  - verb: pnpm
    subcommand: info
    flags: []
    decision: approved

  - verb: pnpm
    subcommand: run
    flags: []
    decision: approved

  - verb: pnpm
    subcommand: test
    flags: []
    decision: approved

  - verb: pnpm
    subcommand: audit
    flags: []
    decision: approved

  # Top-level build/lint tools (no subcommand)
  - verb: tsc
    flags: []
    decision: approved

  - verb: eslint
    flags: []
    decision: approved

  - verb: vite
    flags: []
    decision: approved

  - verb: vitest
    flags: []
    decision: approved
