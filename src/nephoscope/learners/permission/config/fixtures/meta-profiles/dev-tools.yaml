_meta:
  id: dev-tools
  order: 4
  description: "Developer utilities (curl, make, openssl, sqlite3, …)"
permissions:
  # Developer utilities — opt-in permission fixture.
  #
  # Covers common dev tools that are safe for inspection and lightweight
  # build orchestration. Apply selectively; not loaded automatically.

  # make -- dry-run shows what would execute, no side effects
  - verb: make
    flags:
      - "--dry-run"
    decision: approved
    reason: "make --dry-run — shows what would run, no side effects"

  # make -- full target execution within a trusted project directory
  - verb: make
    flags: "*"
    path_spec: "$TRUSTED_DIR/**"
    decision: approved
    reason: "make within trusted project dir — full target execution"

  # curl -- implicit GET, safe for inspection (no flags = no upload/write)
  - verb: curl
    flags: []
    decision: approved
    reason: "curl with no flags — implicit GET, safe for inspection"

  # wget -- URL reachability check, no download
  - verb: wget
    flags:
      - "--spider"
    decision: approved
    reason: "wget --spider — URL reachability check, no download"

  # touch -- create or update file timestamps within trusted project directories
  - verb: touch
    flags: []
    path_spec: "$TRUSTED_DIR/**"
    decision: approved

  # man -- view manual pages
  - verb: man
    flags: []
    decision: approved

  # sqlite3 -- database inspection and querying
  - verb: sqlite3
    flags: "*"
    decision: approved
    reason: "sqlite3 — local DB inspection tool"

  # openssl -- certificate inspection
  - verb: openssl
    subcommand: x509
    flags: []
    decision: approved

  # openssl -- TLS connection diagnostics
  - verb: openssl
    subcommand: s_client
    flags: []
    decision: approved

verb_types:
  # make is intentionally absent: its rule_shapes use subcommand: null (the
  # target is a plain arg, not a subcommand), so adding task_runner would break
  # existing permission matches.
  - verb: openssl
    category: task_runner
