_meta:
  id: credential-file-tools
  description: "Deny Claude Code's file tools (Read, Write, Edit) against credential paths"

permissions:
  # Read-side blocks — prevent Claude Code from opening credential files directly.
  # Note: .env.example and .env.template are intentionally omitted — they are
  # committed templates with no real secrets. The glob **/.env* is NOT used.
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env"
    decision: rejected
    reason: ".env file — Claude Code native Read blocked"
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env.local"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env.development"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env.production"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env.staging"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.env.test"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.dev.vars"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.dev.vars.local"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/*.pem"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/*.key"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/secrets/**"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/credentials/**"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/config/database.yml"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/config/credentials.yml.enc"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.pypirc"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.aws/**"
    decision: rejected
  - verb: Read
    tool: Read
    flags: []
    path_spec: "**/.ssh/**"
    decision: rejected

  # Write-side blocks — prevent Claude Code from writing/overwriting credential files.
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.env"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.env.local"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.env.development"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.env.production"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.env.staging"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/secrets/**"
    decision: rejected
  - verb: Write
    tool: Write
    flags: []
    path_spec: "**/.ssh/**"
    decision: rejected

  # Edit-side blocks — prevent Claude Code from patching credential files in-place.
  - verb: Edit
    tool: Edit
    flags: []
    path_spec: "**/.env"
    decision: rejected
  - verb: Edit
    tool: Edit
    flags: []
    path_spec: "**/secrets/**"
    decision: rejected
  - verb: Edit
    tool: Edit
    flags: []
    path_spec: "**/.ssh/**"
    decision: rejected
