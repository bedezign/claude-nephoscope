_meta:
  id: devops
  order: 6
  description: "DevOps tools (kubectl, docker, terraform, ansible)"
permissions:
  # DevOps tools — opt-in permission fixture.
  #
  # Covers kubectl, helm, docker, terraform read-only subcommands,
  # and ansible inventory inspection.
  #
  # Note: ansible-inventory --list and ansible --list-hosts are FLAGS
  # on a top-level invocation (subcommand: null), not positional subcommands.
  # The parser classifies leading-dash tokens as flags, never as subcommands.

  # kubectl read-only subcommands
  - verb: kubectl
    subcommand: get
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: describe
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: logs
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: version
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: config
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: explain
    flags: []
    decision: approved

  - verb: kubectl
    subcommand: api-resources
    flags: []
    decision: approved

  # helm read/inspect subcommands
  - verb: helm
    subcommand: list
    flags: []
    decision: approved

  - verb: helm
    subcommand: status
    flags: []
    decision: approved

  - verb: helm
    subcommand: history
    flags: []
    decision: approved

  - verb: helm
    subcommand: get
    flags: []
    decision: approved

  - verb: helm
    subcommand: template
    flags: []
    decision: approved

  - verb: helm
    subcommand: version
    flags: []
    decision: approved

  - verb: helm
    subcommand: show
    flags: []
    decision: approved

  - verb: helm
    subcommand: repo
    flags: []
    decision: approved

  # docker read-only subcommands
  - verb: docker
    subcommand: ps
    flags: []
    decision: approved

  - verb: docker
    subcommand: images
    flags: []
    decision: approved

  - verb: docker
    subcommand: inspect
    flags: []
    decision: approved

  - verb: docker
    subcommand: logs
    flags: []
    decision: approved

  - verb: docker
    subcommand: version
    flags: []
    decision: approved

  - verb: docker
    subcommand: info
    flags: []
    decision: approved

  - verb: docker
    subcommand: top
    flags: []
    decision: approved

  # terraform safe subcommands
  - verb: terraform
    subcommand: validate
    flags: []
    decision: approved

  - verb: terraform
    subcommand: plan
    flags: []
    decision: approved

  - verb: terraform
    subcommand: fmt
    flags: []
    decision: approved

  - verb: terraform
    subcommand: version
    flags: []
    decision: approved

  - verb: terraform
    subcommand: output
    flags: []
    decision: approved

  - verb: terraform
    subcommand: show
    flags: []
    decision: approved

  # ansible-inventory -- list is a FLAG, not a subcommand
  - verb: ansible-inventory
    subcommand: null
    flags:
      - "--list"
    decision: approved

  # ansible -- list-hosts is a FLAG, not a subcommand
  - verb: ansible
    subcommand: null
    flags:
      - "--list-hosts"
    decision: approved
