# sed -i: rejected — in-place file editing bypasses the Edit tool audit trail
- verb: sed
  flags:
    - "-i"
  decision: rejected
  reason: "in-place file editing — use explicit Edit tool instead"
  tier: global

- verb: mkdir
  flags:
    - "-p"
  decision: approved
  reason: "mkdir -p (create with parents) — directory creation only"

- verb: cp
  flags: []
  decision: approved
  reason: "File copy — non-destructive in dev context"

- verb: python3
  flags:
    - "-c"
  decision: approved
  reason: "python3 -c — inline script"

- verb: python
  flags:
    - "-c"
  decision: approved
  reason: "python -c — inline script"

- verb: uv
  subcommand: python
  flags:
    - "-c"
  decision: approved
  reason: "uv run python -c — inline Python via uv"

- verb: ctags
  flags: "*"
  decision: approved
  reason: "ctags — read-only tag generation"

- verb: echo
  flags: "*"
  decision: approved
  reason: "echo with any flags — non-destructive; covers separator strings parsed as flags"

- verb: cd
  flags: []
  decision: approved
  reason: "directory navigation — no destructive potential"

- verb: rm
  flags:
    - "-f"
    - "-r"
  path_spec: "$TRUSTED_DIR/**"
  decision: approved
  reason: "rm -rf within a trusted directory"

- verb: rm
  flags:
    - "-r"
  path_spec: "$TRUSTED_DIR/**"
  decision: approved
  reason: "rm -r within a trusted directory"

- verb: rm
  flags:
    - "-f"
  path_spec: "$TRUSTED_DIR/**"
  decision: approved
  reason: "rm -f within a trusted directory"

# git and gh: wildcard-flags approval. Claude Code's LLM layer gates risky
# operations (force-push, reset --hard, branch -D) at the reasoning layer;
# the permission hook is a secondary gate that should not block routine git
# and gh commands used in every development workflow.
- verb: git
  flags: "*"
  decision: approved
  reason: "git — all subcommands/flags; LLM layer gates risky operations (force-push, reset --hard)"

- verb: gh
  flags: "*"
  decision: approved
  reason: "gh — GitHub CLI; all subcommands/flags; LLM layer gates destructive operations"
