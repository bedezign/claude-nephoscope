# Safe permission shapes — globally approved for common, low-risk operations.
#
# These are seeded into the permissions table as global-tier approved rules,
# enabling common read-only and non-destructive operations without prompting.

- verb: Read
  flags: []
  decision: approved
  reason: "Non-destructive file read"

- verb: Glob
  flags: []
  decision: approved
  reason: "Non-destructive file pattern matching"

- verb: Grep
  flags: []
  decision: approved
  reason: "Non-destructive content search"

- verb: Bash
  subcommand: null
  flags:
    - "-c"
  decision: approved
  reason: "Shell invocation for read-only commands"

- verb: Bash
  subcommand: null
  flags: []
  decision: approved
  reason: "Shell invocation without flags"

- verb: Edit
  flags: []
  decision: approved
  reason: "File editing"

- verb: Write
  flags: []
  decision: approved
  reason: "File writing"

# Example of a rejected pattern (uncomment to use)
# - verb: rm
