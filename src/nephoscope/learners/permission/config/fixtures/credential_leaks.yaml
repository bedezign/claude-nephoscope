# Credential-leak deny rules.
#
# Each entry blocks any command (verb="*") that reads a well-known credential
# file. A single verb="*" rule replaces N per-verb rows and covers cat, grep,
# head, less, tail, etc. without enumeration.
#
# These rules are loaded automatically on first install (nephoscope-init) and
# applied as global-tier rejected permissions.

# .env files — application secrets, the dominant credential-leak surface.
# Matched at any depth via basename-glob. .env.example and .env.template
# are deliberately omitted — they're committed examples, not secrets.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env'
  decision: rejected
  reason: '.env file — application secrets (database URLs, API keys, etc.)'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.local'
  decision: rejected
  reason: '.env.local — developer-machine secrets, typically real keys'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.development'
  decision: rejected
  reason: '.env.development — development environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.production'
  decision: rejected
  reason: '.env.production — production environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.staging'
  decision: rejected
  reason: '.env.staging — staging environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.test'
  decision: rejected
  reason: '.env.test — test environment secrets (often real keys for CI)'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.aws/credentials'
  decision: rejected
  reason: 'AWS credentials file — any read exposes access keys to the conversation transcript'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.kube/config'
  decision: rejected
  reason: 'Kubernetes kubeconfig — contains bearer tokens and client certificates'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.docker/config.json'
  decision: rejected
  reason: 'Docker registry credentials (base64-encoded; trivially decoded)'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.npmrc'
  decision: rejected
  reason: 'npm registry auth token — grants publish access to npm packages'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.netrc'
  decision: rejected
  reason: 'Plaintext credentials for FTP, curl, and other network tools'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.bash_history'
  decision: rejected
  reason: 'Shell history — reveals previously-typed credentials and sensitive commands'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.zsh_history'
  decision: rejected
  reason: 'Shell history — reveals previously-typed credentials and sensitive commands'

# Cloudflare Workers dev secrets.
# Matched at any depth via basename-glob.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.dev.vars'
  decision: rejected
  reason: 'Cloudflare Workers dev-env secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.dev.vars.local'
  decision: rejected
  reason: 'Cloudflare Workers dev-env secrets (local machine override)'

# Key and certificate files — matched by extension at any depth.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/*.pem'
  decision: rejected
  reason: 'PEM-encoded private key or certificate — covers TLS keys, SSH keys, etc.'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/*.key'
  decision: rejected
  reason: 'Generic key file — private keys for TLS, SSH, API clients, etc.'

# Named credential directories — directory-glob catches any file underneath.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/secrets/**'
  decision: rejected
  reason: 'secrets/ directory — common pattern for mounted secrets and vault output'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/credentials/**'
  decision: rejected
  reason: 'credentials/ directory — common pattern for service account credentials'

# Framework config files that embed connection strings or encrypted secrets.
# Matched via deep-path variant at any project depth.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/config/database.yml'
  decision: rejected
  reason: 'Rails DB config — contains database URL with credentials'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/config/credentials.yml.enc'
  decision: rejected
  reason: 'Rails encrypted credentials file'

# PyPI upload token.

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.pypirc'
  decision: rejected
  reason: 'PyPI upload token — grants publish access to Python packages'
