# Credential-leak deny rules.
#
# Each entry blocks any command (verb="*") that reads a well-known credential
# file. A single verb="*" rule replaces N per-verb rows and covers cat, grep,
# head, less, tail, etc. without enumeration.
#
# These rules are loaded automatically on first install (nephoscope-init) and
# applied as global-tier rejected permissions.

# .env files — application secrets, the dominant credential-leak surface.
# Matched at any depth via basename-glob. .env.example and .env.template
# are deliberately omitted — they're committed examples, not secrets.

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env'
  decision: rejected
  reason: '.env file — application secrets (database URLs, API keys, etc.)'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.local'
  decision: rejected
  reason: '.env.local — developer-machine secrets, typically real keys'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.development'
  decision: rejected
  reason: '.env.development — development environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.production'
  decision: rejected
  reason: '.env.production — production environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.staging'
  decision: rejected
  reason: '.env.staging — staging environment secrets'

- verb: '*'
  flags: '*'
  path_spec: '$CWD/**/.env.test'
  decision: rejected
  reason: '.env.test — test environment secrets (often real keys for CI)'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.aws/credentials'
  decision: rejected
  reason: 'AWS credentials file — any read exposes access keys to the conversation transcript'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.kube/config'
  decision: rejected
  reason: 'Kubernetes kubeconfig — contains bearer tokens and client certificates'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.docker/config.json'
  decision: rejected
  reason: 'Docker registry credentials (base64-encoded; trivially decoded)'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.npmrc'
  decision: rejected
  reason: 'npm registry auth token — grants publish access to npm packages'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.netrc'
  decision: rejected
  reason: 'Plaintext credentials for FTP, curl, and other network tools'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.bash_history'
  decision: rejected
  reason: 'Shell history — reveals previously-typed credentials and sensitive commands'

- verb: '*'
  flags: '*'
  path_spec: '$HOME/.zsh_history'
  decision: rejected
  reason: 'Shell history — reveals previously-typed credentials and sensitive commands'
