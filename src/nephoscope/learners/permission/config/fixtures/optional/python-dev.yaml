# Python development tooling — opt-in permission fixture.
#
# Covers uv subcommands, common linting/testing/analysis tools,
# and safe pip read-only subcommands. Apply on Python projects.

# uv subcommands — project and environment management
- verb: uv
  subcommand: run
  flags: []
  decision: approved

- verb: uv
  subcommand: sync
  flags: []
  decision: approved

- verb: uv
  subcommand: lock
  flags: []
  decision: approved

- verb: uv
  subcommand: pip
  flags: []
  decision: approved

- verb: uv
  subcommand: tool
  flags: []
  decision: approved

- verb: uv
  subcommand: add
  flags: []
  decision: approved

- verb: uv
  subcommand: remove
  flags: []
  decision: approved

