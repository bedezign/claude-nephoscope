# Declarative permission rules for the learner hook.
#
# Two tiers:
#
# - **denied_***: hard block. The hook emits permissionDecision=deny with no
#   override path. Reserved for truly catastrophic / irreversible operations
#   (partition destruction, system halt, privilege escalation). Sudo is
#   enforced procedurally in deny.py.
# - **ask_***: user-confirmable. The hook emits permissionDecision=ask and
#   the user decides per-call. Used for file ops, process control, package
#   managers, and anything destructive-but-recoverable.
#
# Procedural guardrails in deny.py:
# - `sudo` always hard-denied.
# - Redirections (>, >>) into guarded system paths always hard-denied.
# - Truncate-redirect (>) over an existing file → ask.

denied_verbs:
  - dd
  - mkfs
  - fdisk
  - parted
  - shutdown
  - reboot
  - halt
  - su

denied_subcommands:
  systemctl:
    - reboot
    - poweroff

denied_flag_patterns: {}

ask_verbs:
  - rm
  - mv
  - chmod
  - chown
  - chgrp
  - kill
  - killall
  - pkill
  - mount
  - umount
  - apt
  - apt-get
  - yay
  - pacman
  - dnf
  - yum
  - zypper
  - brew
  - snap
  - flatpak

ask_subcommands:
  git:
    - push
    - reset
    - clean
    - rebase
  docker:
    - rm
    - rmi
    - system
    - volume
  systemctl:
    - stop
    - disable
    - mask
  npm:
    - install
    - uninstall
    - publish
  pip:
    - install
    - uninstall
  uv:
    - publish
  cargo:
    - publish

ask_flag_patterns:
  git:
    - "--force"
    - "-f"
    - "--hard"
  rm:
    - "-r"
    - "-R"
    - "--recursive"
    - "-f"
    - "--force"
  curl:
    - "--upload-file"
    - "-T"
  wget:
    - "--post-file"
